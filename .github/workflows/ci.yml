name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Install the package in dev mode + pytest. Skip the heavy ML
          # deps (torch, transformers, peft) — they're not needed for
          # the prompt/normalize tests, which are deliberately CPU-only
          # and CI-friendly. The .pt files and model loading live in
          # tests we'll add for the eval/gate work, which can opt-in to
          # the heavy stack via a separate CI job.
          # pytest + the minimal runtime deps the lightweight test lane
          # actually exercises. pyyaml is used by eval.py to parse Betley's
          # question banks; everything else (torch/transformers/peft) stays
          # out of this lane via --no-deps + the ImportError guard in
          # __init__.py.
          pip install pytest pyyaml
          pip install -e . --no-deps
      - name: Run tests
        run: pytest tests/ -v
