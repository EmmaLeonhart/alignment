name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Install the package in dev mode + pytest. Skip the heavy ML
          # deps (torch, transformers, peft) — they're not needed for
          # the prompt/normalize tests, which are deliberately CPU-only
          # and CI-friendly. The .pt files and model loading live in
          # tests we'll add for the eval/gate work, which can opt-in to
          # the heavy stack via a separate CI job.
          pip install pytest
          pip install -e . --no-deps
      - name: Run tests
        run: pytest tests/ -v
